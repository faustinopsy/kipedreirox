<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobre Nós - Ki-Pedreiro</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        /* Estilos específicos para a página Sobre */
        .sobre-hero {
            background-color: #222;
            color: #fff;
            padding: 60px 20px;
            text-align: center;
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('assets/img/bricklaying-construction-worker-building-brick-wall-min.jpg');
            background-size: cover;
            background-position: center;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 60px;
            /* Espaço para navbar fixa */
        }

        .sobre-hero h1 {
            font-size: 2.5rem;
            margin: 0;
            color: var(--cor-laranja);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .sobre-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .sobre-principal {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            align-items: center;
            margin-bottom: 60px;
        }

        .sobre-img {
            flex: 1;
            min-width: 300px;
        }

        .sobre-img img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .sobre-texto {
            flex: 1;
            min-width: 300px;
        }

        .sobre-texto h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #333;
            border-left: 5px solid var(--cor-laranja);
            padding-left: 15px;
        }

        .sobre-texto p {
            line-height: 1.6;
            color: #555;
            font-size: 1.1rem;
            white-space: pre-line;
            /* Respeita quebras de linha do banco */
        }

        .mvv-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .mvv-card {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
            border-top: 4px solid var(--cor-laranja);
            /* Valor padrão */
            transition: transform 0.3s ease;
        }

        .mvv-card:hover {
            transform: translateY(-5px);
        }

        .mvv-card:nth-child(1) {
            border-color: #ff9800;
        }

        .mvv-card:nth-child(2) {
            border-color: #2196f3;
        }

        .mvv-card:nth-child(3) {
            border-color: #4caf50;
        }

        .mvv-icon {
            font-size: 2.5rem;
            margin-bottom: 20px;
            display: inline-block;
        }

        .mvv-card h3 {
            margin-bottom: 15px;
            font-size: 1.5rem;
            color: #333;
        }

        .mvv-card p {
            color: #666;
            line-height: 1.5;
        }

        /* Loader */
        .loader-container {
            text-align: center;
            padding: 50px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--cor-laranja);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <header class="cabecalho" id="navbar">
        <!-- Navbar injetada por JS -->
    </header>

    <main id="main-content">
        <!-- Conteúdo será injetado via JS -->
        <div class="loader-container">
            <div class="spinner"></div>
            <p>Carregando informações...</p>
        </div>
    </main>

    <footer class="rodape" id="footer">
        <!-- Rodapé injetado por JS -->
    </footer>

    <script src="assets/js/navbar.js"></script>
    <script src="assets/js/rodape.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const mainContent = document.getElementById('main-content');

            fetch('/backend/api/sobre')
                .then(response => {
                    if (!response.ok) throw new Error('Erro na rede');
                    return response.json();
                })
                .then(json => {
                    if (json.status === 'success' && json.data) {
                        renderSobre(json.data);
                    } else {
                        mainContent.innerHTML = `
                            <div class="container" style="padding:100px 20px;text-align:center;">
                                <h2>Conteúdo não encontrado</h2>
                                <p>As informações sobre a empresa ainda não foram cadastradas.</p>
                                <a href="index.html" class="botao botao--primario">Voltar ao Início</a>
                            </div>
                        `;
                    }
                })
                .catch(error => {
                    console.error('Erro:', error);
                    mainContent.innerHTML = `
                        <div class="container" style="padding:100px 20px;text-align:center;">
                            <h2>Erro ao carregar</h2>
                            <p>Não foi possível carregar as informações no momento.</p>
                        </div>
                    `;
                });

            function renderSobre(data) {
                const imagemUrl = data.caminho_imagem || 'assets/img/bricklaying-construction-worker-building-brick-wall-min.jpg';

                const html = `
                    <div class="sobre-hero">
                        <h1>${data.titulo_sobre || 'Sobre Nós'}</h1>
                    </div>

                    <div class="sobre-container">
                        <div class="sobre-principal">
                            <div class="sobre-img">
                                <img src="${imagemUrl}" alt="${data.titulo_sobre}">
                            </div>
                            <div class="sobre-texto">
                                <h2>${data.titulo_sobre}</h2>
                                <p>${data.descricao_sobre || ''}</p>
                            </div>
                        </div>

                        <div class="mvv-grid">
                            <div class="mvv-card">
                                <span class="mvv-icon">🎯</span>
                                <h3>Missão</h3>
                                <p>${data.missao_sobre || 'Em breve...'}</p>
                            </div>
                            <div class="mvv-card">
                                <span class="mvv-icon">👁️</span>
                                <h3>Visão</h3>
                                <p>${data.visao_sobre || 'Em breve...'}</p>
                            </div>
                            <div class="mvv-card">
                                <span class="mvv-icon">💎</span>
                                <h3>Valores</h3>
                                <p>${data.valores_sobre || 'Em breve...'}</p>
                            </div>
                        </div>
                    </div>
                `;

                mainContent.innerHTML = html;
            }
        });
    </script>
</body>

</html>
