<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nossos Serviços - Ki-Pedreiro</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .servicos-hero {
            background-color: #222;
            color: #fff;
            padding: 80px 20px 40px;
            text-align: center;
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('assets/img/bricklayer-adding-cement-top-bricks-min.jpg');
            background-size: cover;
            background-position: center;
            margin-top: 60px;
        }

        .servicos-hero h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--cor-laranja);
        }
    </style>
</head>

<body>
    <header class="cabecalho" id="navbar">
    </header>
    <main>
        <section class="servicos-hero">
            <div class="container">
                <h1>Nossos Serviços</h1>
                <p>Soluções completas para sua obra, do alicerce ao acabamento.</p>
            </div>
        </section>

        <section class="servicos">
            <div class="container">
                <div class="servicos__lista"></div>
            </div>
        </section>
    </main>

    <footer class="rodape" id="footer">
    </footer>
    <script src="assets/js/navbar.js"></script>
    <script src="assets/js/rodape.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const container = document.querySelector('.servicos__lista');
            if (!container) return;
            container.innerHTML = '<h3>Carregando serviços...</h3>';
            fetch('/backend/api/servicos')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Falha ao carregar dados da rede.');
                    }
                    return response.json();
                })
                .then(json => {
                    if (json.status !== 'success' || !json.data) {
                        throw new Error('API retornou um erro: ' + (json.message || 'Formato inválido'));
                    }

                    container.innerHTML = '';
                    json.data.forEach(servico => {
                        const cardHtml = `
                            <div class="card" data-service="${servico.nome_servico.toLowerCase()}">
                                <div class="card__frente" style="background-image: url('${servico.caminho_imagem}');">
                                    <h3 class="card__titulo">${servico.nome_servico.toUpperCase()}</h3>
                                </div>
                                <div class="card__verso">
                                    <h3 class="card__titulo--verso">${servico.nome_servico.toUpperCase()}</h3>
                                    <p class="card__descricao">${servico.descricao_servico}</p>
                                </div>
                            </div>
                        `;
                        container.insertAdjacentHTML('beforeend', cardHtml);
                    });
                })
                .catch(error => {
                    console.error('Erro ao buscar serviços:', error);
                    container.innerHTML = '<p style="color: red;">Não foi possível carregar os serviços no momento. Tente novamente mais tarde.</p>';
                });
        });
    </script>
</body>

</html>
